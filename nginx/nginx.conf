# ============================================================
# nginx/nginx.conf — Configuration Nginx (reverse proxy)
#
# Rôle :
#   - Écoute sur les ports 80 (HTTP) et 443 (HTTPS/TLS)
#   - Redirige tout HTTP → HTTPS
#   - Proxifie les requêtes vers le backend NestJS (port 3000)
#   - Rate limiting global : 100 req/min par IP
#   - Headers de sécurité : HSTS, X-Frame-Options, CSP
#   - Compression gzip des réponses JSON
#   - Certificats SSL configurables (Let's Encrypt ou auto-signé)
# ============================================================
